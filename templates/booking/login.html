{% extends "booking/base.html" %}

{% block title %}Entrar{% endblock %}

{% block content %}
<div class="card form-shell">
    <h2>Entrar na plataforma</h2>
    <p>Acesse sua conta para reservar quadras e acompanhar suas reservas.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary btn-full" type="submit">Entrar</button>
    </form>

    <p class="helper-text">
        Ainda não tem conta?
        <a href="{% url 'signup' %}"><strong>Cadastre-se</strong></a>
    </p>
</div>
{% endblock %}
